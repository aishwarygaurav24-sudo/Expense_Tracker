{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="mb-3 text-center">➕ Add Expense</h3>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Amount (₹)</label>
          <input type="number" step="0.01" name="amount" class="form-control" placeholder="Enter amount" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select name="category" class="form-select" required>
            <option value="">-- Select Category --</option>
            {% for cat in categories %}
              <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input type="text" name="description" class="form-control" placeholder="Optional description">
        </div>
        <div class="mb-3">
          <label class="form-label">Date</label>
          <input type="date" name="date" class="form-control" value="{{ today|default:None }}">
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Expense</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
