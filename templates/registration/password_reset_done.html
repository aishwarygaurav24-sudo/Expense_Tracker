{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<form method="post">
  {% csrf_token %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4 shadow-sm text-center">
      <h4>Check your email</h4>
      <p class="text-muted">If an account exists with the email provided, you'll receive a password reset link shortly.</p>
      <a href="{% url 'login' %}" class="btn btn-secondary">Back to Login</a>
    </div>
  </div>
</div>
</form>
{% endblock %}
